<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gamevine Arcade Template</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="panel">
        <header class="hud">
          <div>
            <p class="eyebrow">Gamevine POC Template</p>
            <h1>Arcade Canvas Starter</h1>
          </div>
          <p class="status" id="status-label">Template ready for AI edits</p>
        </header>
        <canvas id="game" width="800" height="480" aria-label="Game canvas"></canvas>
        <p class="hint">
          This starter is intentionally minimal. The generation flow should turn it into a playable
          Breakout game, and the feature-update flow should patch that result without adding new
          dependencies.
        </p>
      </section>
    </main>
    <script type="module" src="./main.js"></script>
  </body>
</html>
